name: API Tests

on:
  push:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-tests.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-tests.yml"

jobs:
  test-api:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run API tests
        id: run_tests
        shell: bash
        run: |
          python -m pytest -q tests 2>&1 | tee pytest-output.txt
          test ${PIPESTATUS[0]} -eq 0

      - name: Build smoke summary
        if: always()
        run: |
          SUMMARY_LINE=$(grep -E "[0-9]+ (passed|failed|error|errors|skipped|xfailed|xpassed)" pytest-output.txt | tail -n 1 || true)
          cat > api-smoke-summary.json <<EOF
          {
            "workflow": "API Tests",
            "job": "test-api",
            "tests_step_outcome": "${{ steps.run_tests.outcome }}",
            "summary_line": "${SUMMARY_LINE}",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "run_id": "${{ github.run_id }}",
            "generated_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload API test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: |
            apps/api/pytest-output.txt
            apps/api/api-smoke-summary.json
          if-no-files-found: warn
