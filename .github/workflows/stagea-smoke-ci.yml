name: StageA Smoke CI
# Retry marker: keep this workflow touchable to force reruns when needed.

on:
  push:
    paths:
      - "apps/api/**"
      - "scripts/stagea-smoke.ps1"
      - ".github/workflows/stagea-smoke-ci.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - "scripts/stagea-smoke.ps1"
      - ".github/workflows/stagea-smoke-ci.yml"
  workflow_dispatch:

jobs:
  stagea-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          ENVIRONMENT=ci
          PROJECT_NAME=Mande24 Independent API
          API_PREFIX=/api/v1
          DATABASE_URL=postgresql+psycopg://mande24_user:ci_password@postgres:5432/mande24
          AUTO_CREATE_TABLES=true
          JWT_SECRET_KEY=ci_super_secret_key_not_for_production
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=60
          ENABLE_COMMISSION_SCHEDULER=false
          COMMISSION_CLOSE_HOUR_UTC=1
          COMMISSION_CLOSE_MINUTE_UTC=0
          COMMISSION_SCHEDULER_RUN_ON_STARTUP=false
          NEXT_PUBLIC_API_URL=http://localhost:8000
          POSTGRES_DB=mande24
          POSTGRES_USER=mande24_user
          POSTGRES_PASSWORD=ci_password
          EOF

      - name: Start API stack
        run: |
          docker compose up -d --build postgres redis api

      - name: Wait for API health
        shell: pwsh
        run: |
          $maxTries = 60
          for ($i = 1; $i -le $maxTries; $i++) {
            try {
              $r = Invoke-RestMethod -Uri "http://localhost:8000/api/v1/health" -Method Get -TimeoutSec 5
              if ($r.status -eq "ok") {
                Write-Host "API ready"
                exit 0
              }
            } catch {
            }
            Start-Sleep -Seconds 2
          }
          throw "API did not become healthy in time."

      - name: Seed minimal geo catalog
        run: |
          docker compose exec -T api python -m app.scripts.seed_smoke_geo

      - name: Run Stage A smoke
        shell: pwsh
        run: |
          $reportPath = "${{ github.workspace }}/stagea-smoke-report.json"
          & "${{ github.workspace }}/scripts/stagea-smoke.ps1" -ApiBase "http://localhost:8000" -ReportPath $reportPath

      - name: Upload Stage A smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stagea-smoke-report
          path: stagea-smoke-report.json
          if-no-files-found: warn

      - name: Show API logs on failure
        if: failure()
        run: |
          docker compose logs api --tail 200
