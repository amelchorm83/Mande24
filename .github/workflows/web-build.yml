name: Web Build

on:
  push:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-build.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-build.yml"

jobs:
  build-web:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package.json

      - name: Install dependencies
        run: npm install

      - name: Lint web (if present)
        run: npm run --if-present lint

      - name: Test web (if present)
        run: npm run --if-present test

      - name: Build web
        run: npm run build
