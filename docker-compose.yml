services:
  api:
    build:
      context: ./apps/api
    container_name: mande24-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ./apps/web
    container_name: mande24-web
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api

  postgres:
    image: postgres:16
    container_name: mande24-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mande24-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
